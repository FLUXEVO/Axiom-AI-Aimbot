name: Auto Tag and Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main
      - GPU

  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to release"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - GPU

permissions:
  contents: write

jobs:
  tag-and-release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: Set target branch
        id: branch
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            branch="${{ inputs.target_branch }}"
          else
            branch="${{ github.event.pull_request.base.ref }}"
          fi

          echo "branch=$branch" >> "$GITHUB_OUTPUT"

          if [[ "$branch" == "GPU" ]]; then
            echo "prefix=gpu" >> "$GITHUB_OUTPUT"
            echo "release_name_prefix=Release GPU" >> "$GITHUB_OUTPUT"
          else
            echo "prefix=main" >> "$GITHUB_OUTPUT"
            echo "release_name_prefix=Release Main" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.branch }}
          fetch-depth: 0

      - name: Create next branch tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          prefix="${{ steps.branch.outputs.prefix }}"

          git fetch --tags

          latest_tag=$(git tag --list "${prefix}-1.*" --sort=-v:refname | head -n 1)

          if [[ -z "${latest_tag}" ]]; then
            next_tag="${prefix}-1.0"
            version="1.0"
          else
            latest_version="${latest_tag#${prefix}-}"
            latest_minor="${latest_version#1.}"
            next_minor=$((latest_minor + 1))
            version="1.${next_minor}"
            next_tag="${prefix}-${version}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "${next_tag}"
          git push origin "${next_tag}"

      - name: Create source zip
        shell: bash
        run: |
          zip_name="source-${{ steps.tag.outputs.next_tag }}.zip"
          git archive --format=zip --output "$zip_name" HEAD
          echo "ZIP_NAME=$zip_name" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.next_tag }}
          name: ${{ steps.branch.outputs.release_name_prefix }} ${{ steps.tag.outputs.version }}
          generate_release_notes: true
          files: ${{ env.ZIP_NAME }}
