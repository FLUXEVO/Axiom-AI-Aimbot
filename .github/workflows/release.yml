name: Auto Tag and Release

on:
  push:
    branches:
      - main
      - GPU

  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout current commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release mode
        id: mode
        shell: pwsh
        run: |
          $branch = "${{ github.ref_name }}"

          if ($branch -eq "GPU") {
            "tag_prefix=release-gpu-v" >> $env:GITHUB_OUTPUT
            "release_name=Release GPU" >> $env:GITHUB_OUTPUT
            "zip_name=RemoteGamepadBridge-GPU-Source.zip" >> $env:GITHUB_OUTPUT
          }
          else {
            "tag_prefix=release-v" >> $env:GITHUB_OUTPUT
            "release_name=Release" >> $env:GITHUB_OUTPUT
            "zip_name=RemoteGamepadBridge-Source.zip" >> $env:GITHUB_OUTPUT
          }

      - name: Generate incremental tag
        id: tag
        shell: pwsh
        run: |
          git fetch --tags

          $prefix = "${{ steps.mode.outputs.tag_prefix }}"
          $tags = git tag -l "$prefix*"

          $max = 0
          foreach ($tag in $tags) {
            if ($tag -match "^$([regex]::Escape($prefix))(\d+)$") {
              $num = [int]$matches[1]
              if ($num -gt $max) { $max = $num }
            }
          }

          $next = $max + 1
          $newTag = "$prefix$next"

          "tag=$newTag" >> $env:GITHUB_OUTPUT
          "version=$next" >> $env:GITHUB_OUTPUT

      - name: Create source zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts | Out-Null

          $zipPath = ".\artifacts\${{ steps.mode.outputs.zip_name }}"

          Compress-Archive `
            -Path .\* `
            -DestinationPath $zipPath `
            -Force

      - name: Create tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}" "${{ github.sha }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.mode.outputs.release_name }} ${{ steps.tag.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: .\artifacts\*.zip
